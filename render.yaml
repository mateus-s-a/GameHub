services:
  # Backend API Service
  - type: web
    name: gamehub-api
    env: node
    plan: free
    region: ohio # Adjust as needed
    buildCommand: npm install && (cd apps/api && npx prisma generate) && npx turbo run build --filter=api
    startCommand: "cd apps/api && node dist/index.js"
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: gamehub-db
          property: connectionString
      - key: NODE_VERSION
        value: 22
      # Optional: Set CORS_ORIGIN in the Render Dashboard to restrict origins.
      # Example: https://gamehub-web-snvi.onrender.com
      # If not set, the API will accept requests from any origin.

  # Frontend Web Service
  - type: web
    name: gamehub-web
    env: node
    plan: free
    region: ohio # Adjust as needed
    buildCommand: npm install && npx turbo run build --filter=web
    startCommand: "cd apps/web && npx next start"
    envVars:
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://gamehub-api.onrender.com
        # ⚠️ IMPORTANT: After first deploy, check your ACTUAL API URL in the
        # Render Dashboard. Render may add a random suffix (e.g. gamehub-api-abc1.onrender.com).
        # If it doesn't match, update this value in the Render Dashboard > Environment.
      - key: NODE_VERSION
        value: 22

databases:
  - name: gamehub-db
    plan: free
    region: ohio
