name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Turborepo Cache
        uses: dtinth/setup-github-actions-cache@v2

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run check-types

      - name: Build
        run: npm run build

      - name: Deploy to Render (API & Web)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl "${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}"
          curl "${{ secrets.RENDER_WEB_DEPLOY_HOOK_URL }}"
